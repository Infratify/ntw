# one file, whole AI stack: a chat app and the brain it talks to
# demo prep: docker compose up -d
#            docker compose exec brain ollama pull llama3.2:1b
name: ai

services:

  brain:
    image: ollama/ollama
    volumes:
      - models:/root/.ollama

  chat:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://brain:11434
      WEBUI_AUTH: "false"
    volumes:
      - chat-data:/app/backend/data
    depends_on:
      - brain

volumes:
  models:
  chat-data:
