name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install deck dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all decks
        run: pnpm build

      - name: Compose site
        # Stitches the static hub page together with every built deck
        # (why-*/). Assembled explicitly (not the whole repo) so
        # node_modules, lockfiles, .git etc. never reach the deployed artifact.
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          cp -r assets _site/assets
          for deck in why-*/; do
            slug="$(basename "$deck")"
            cp -r "$deck/dist" "_site/$slug"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
